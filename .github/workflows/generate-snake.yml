name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"  # Runs daily at midnight UTC
  workflow_dispatch:     # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Generate Snake Animation
        uses: Platane/snk@master
        with:
          github_user_name: ${{ github.repository_owner }}  # Your GitHub username
          svg_out_path: dist/github-contribution-grid-snake.svg
          
      - name: push svg to output branch
        uses: actions/upload-artifact@v2
        with:
          name: github-contribution-grid-snake.svg
          path: dist/github-contribution-grid-snake.svg
          
      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          mkdir -p output
          cp dist/github-contribution-grid-snake.svg output/github-contribution-grid-snake.svg
          git add output/github-contribution-grid-snake.svg
          git commit -m "Generate snake animation" || echo "No changes to commit"
          git push
